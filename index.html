<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimax Search</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        /* Design moderne et responsive */
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e1e2f, #dc3545); /* Dégradé sombre vers rouge */
        }
        .container {
            background: white;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        header { margin-bottom: 25px; }
        .logo { width: 70px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
        h1 { font-family: 'Montserrat', sans-serif; color: #dc3545; font-size: 24px; }
        
        /* Style des onglets (IP / Email) */
        .tabs { margin-bottom: 25px; display: flex; gap: 5px; }
        .tab {
            flex: 1;
            padding: 12px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 8px;
            background: #f0f0f0;
            transition: all 0.3s ease;
        }
        .tab.active { background: #dc3545; color: white; }
        
        /* Formulaire */
        form { display: flex; flex-direction: column; gap: 15px; }
        input {
            padding: 15px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
        }
        input:focus { border-color: #dc3545; }
        
        button[type="submit"] {
            padding: 15px;
            border: none;
            background: #dc3545;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            font-size: 16px;
        }

        /* Messages de statut (Succès / Erreur) */
        #status-msg {
            margin-top: 15px;
            font-size: 0.9em;
            display: none; /* Caché par défaut */
            padding: 10px;
            border-radius: 5px;
        }
        .error { background: #ffebee; color: #c62828; display: block !important; }
        .success { background: #e8f5e9; color: #2e7d32; display: block !important; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="https://static.vecteezy.com/system/resources/thumbnails/011/759/881/small/us-u-s-letter-logo-design-initial-letter-us-linked-circle-uppercase-monogram-logo-red-and-blue-us-logo-u-s-design-us-u-s-vector.jpg" class="logo" alt="Logo">
        <h1>Ultimax Search</h1>
    </header>

    <div class="tabs">
        <button id="ip-tab" class="tab active">Localiser IP</button>
        <button id="email-tab" class="tab">Sécurité Email</button>
    </div>

    <form id="search-form">
        <input id="user-input" type="text" placeholder="Entrez une IP (ex: 8.8.8.8)" required>
        <button type="submit" id="submit-btn">Rechercher</button>
    </form>

    <div id="status-msg"></div>
</div>

<script>
    // Récupération des éléments HTML pour les manipuler
    const searchForm = document.getElementById("search-form");
    const userInput = document.getElementById("user-input");
    const statusMsg = document.getElementById("status-msg");
    const ipTab = document.getElementById("ip-tab");
    const emailTab = document.getElementById("email-tab");
    
    // Variable pour savoir si on recherche une IP ou un Email
    let activeMode = "ip";

    // Action au clic sur l'onglet IP
    ipTab.onclick = () => {
        activeMode = "ip";
        updateUI("Localiser IP", "Entrez une IP (ex: 8.8.8.8)", ipTab, emailTab);
    };

    // Action au clic sur l'onglet Email
    emailTab.onclick = () => {
        activeMode = "email";
        updateUI("Vérifier Email", "Entrez un email...", emailTab, ipTab);
    };

    // Fonction pour mettre à jour l'interface visuellement
    function updateUI(btnText, placeholder, activeBtn, inactiveBtn) {
        document.getElementById("submit-btn").innerText = btnText;
        userInput.placeholder = placeholder;
        activeBtn.classList.add("active");
        inactiveBtn.classList.remove("active");
        statusMsg.style.display = "none"; // Cache les messages d'erreur précédents
        userInput.value = ""; // Vide le champ
    }

    // Gestion de la soumission du formulaire
    searchForm.addEventListener("submit", (e) => {
        e.preventDefault(); // Empêche le rechargement de la page
        const value = userInput.value.trim(); // Récupère la valeur saisie sans espaces inutiles
        
        if (activeMode === "ip") {
            /* SÉCURITÉ : REGEX (Expression Régulière)
               Vérifie que l'entrée suit bien le format 0-255.0-255.0-255.0-255
               Cela empêche l'envoi de texte malveillant ou d'URLs frauduleuses.
            */
            const ipRegex = /^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$/;
            
            if (ipRegex.test(value)) {
                showStatus("Redirection vers IPLocation...", "success");
                
                /* SÉCURITÉ : encodeURIComponent
                   Nettoie la valeur pour qu'elle soit injectable dans une URL sans risque.
                */
                const safeIp = encodeURIComponent(value);
                
                // Redirection après un court délai pour l'expérience utilisateur
                setTimeout(() => {
                    window.open(`https://www.iplocation.net/search?q=${safeIp}`, "_blank");
                }, 800);
            } else {
                showStatus(" Format d'IP invalide (ex: 1.1.1.1)", "error");
            }

        } else if (activeMode === "email") {
            // Validation simple de l'email
            if (value.includes("@") && value.length > 5) {
                showStatus("Vérification des fuites de données...", "success");
                
                setTimeout(() => {
                    // Ouvre HaveIBeenPwned dans un nouvel onglet
                    window.open(`https://haveibeenpwned.com/account/${encodeURIComponent(value)}`, "_blank");
                }, 800);
            } else {
                showStatus(" Veuillez entrer un email valide.", "error");
            }
        }
    });

    // Fonction pour afficher les messages de succès ou d'erreur
    function showStatus(text, type) {
        statusMsg.innerText = text;
        statusMsg.className = type; // Ajoute la classe CSS 'error' ou 'success'
    }
</script>

</body>
</html>
