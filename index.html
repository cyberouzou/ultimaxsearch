<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimax Search | Sécurisé</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        /* Styles conservés et légèrement épurés */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #dc3545, #f8f9fa);
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 25px;
        }
        .logo { width: 60px; margin-bottom: 10px; }
        h1 { font-family: 'Montserrat', sans-serif; color: #dc3545; margin: 0; }
        
        .tabs { margin-bottom: 20px; display: flex; gap: 10px; justify-content: center; }
        .tab {
            padding: 10px 25px;
            border: 2px solid transparent;
            cursor: pointer;
            font-weight: bold;
            border-radius: 8px;
            background: #f1f1f1;
            transition: 0.3s;
        }
        .tab.active { background: #dc3545; color: white; }
        
        form { display: flex; flex-direction: column; gap: 10px; }
        input {
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 6px;
            outline: none;
        }
        input:focus { border-color: #dc3545; }
        
        button[type="submit"] {
            padding: 12px;
            border: none;
            background: #dc3545;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            font-size: 16px;
        }
        button[type="submit"]:hover { background: #b02a37; }

        #results {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            background: #f9f9f9;
            text-align: left;
            display: none;
            border-left: 5px solid #dc3545;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="https://i.postimg.cc/K819rZ64/Capture.png" class="logo" alt="Logo">
        <h1>Ultimax Search</h1>
    </header>

    <div class="tabs">
        <button id="ip-tab" class="tab active">IP Lookup</button>
        <button id="email-tab" class="tab">Email Security</button>
    </div>

    <form id="search-form">
        <input id="main-input" type="text" placeholder="Entrez une adresse IP (ex: 8.8.8.8)" required>
        <button type="submit">Rechercher</button>
    </form>

    <div id="results"></div>
</div>

<script>
    // Configuration
    let activeTab = "ip";
    const searchForm = document.getElementById("search-form");
    const mainInput = document.getElementById("main-input");
    const resultsDiv = document.getElementById("results");
    const ipTab = document.getElementById("ip-tab");
    const emailTab = document.getElementById("email-tab");

    // Gestion du changement d'onglets
    ipTab.onclick = () => {
        activeTab = "ip";
        ipTab.classList.add("active");
        emailTab.classList.remove("active");
        mainInput.placeholder = "Entrez une adresse IP (ex: 8.8.8.8)";
        resultsDiv.style.display = "none";
    };

    emailTab.onclick = () => {
        activeTab = "email";
        emailTab.classList.add("active");
        ipTab.classList.remove("active");
        mainInput.placeholder = "Entrez un email...";
        resultsDiv.style.display = "none";
    };

    // Fonction de nettoyage (Sanitization) pour éviter les failles XSS
    function escapeHTML(str) {
        const p = document.createElement('p');
        p.textContent = str;
        return p.innerHTML;
    }

    searchForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const query = mainInput.value.trim();
        
        resultsDiv.style.display = "block";
        resultsDiv.innerHTML = "chargement...";

        if (activeTab === "ip") {
            // Validation REGEX robuste pour IPv4
            const ipRegex = /^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$/;
            
            if (!ipRegex.test(query)) {
                resultsDiv.innerHTML = "❌ Format d'adresse IP invalide.";
                return;
            }

            try {
                // Utilisation de ip-api.com (Gratuit, pas de clé exposée nécessaire)
                const response = await fetch(`http://ip-api.com/json/${query}?fields=status,message,country,regionName,city,zip,lat,lon,timezone,isp,org,as,query`);
                const data = await response.json();

                if (data.status === "fail") {
                    resultsDiv.innerHTML = `❌ Erreur : ${escapeHTML(data.message)}`;
                    return;
                }

                // Construction sécurisée du HTML
                resultsDiv.innerHTML = `
                    <h3 style="margin-top:0">Informations IP</h3>
                    <p><strong>Cible :</strong> ${escapeHTML(data.query)}</p>
                    <p><strong>Localisation :</strong> ${escapeHTML(data.city)}, ${escapeHTML(data.country)} (${escapeHTML(data.regionName)})</p>
                    <p><strong>ISP :</strong> ${escapeHTML(data.isp)}</p>
                    <p><strong>Coordonnées :</strong> ${data.lat}, ${data.lon}</p>
                    <hr>
                    <a href="https://www.abuseipdb.com/check/${data.query}" target="_blank" style="color:#dc3545; font-size: 0.8em;">Vérifier la réputation sur AbuseIPDB ↗</a>
                `;
            } catch (error) {
                resultsDiv.innerHTML = "❌ Erreur réseau ou blocage de l'API.";
            }

        } else if (activeTab === "email") {
            // Sécurité simple pour l'email
            if (!query.includes("@") || query.length < 5) {
                resultsDiv.innerHTML = "❌ Veuillez entrer un email valide.";
                return;
            }
            
            // Redirection vers un service tiers reconnu pour la sécurité
            resultsDiv.innerHTML = "✅ Redirection vers HaveIBeenPwned en cours...";
            setTimeout(() => {
                window.open(`https://haveibeenpwned.com/account/${encodeURIComponent(query)}`, "_blank");
            }, 1000);
        }
    });
</script>

</body>
</html>
